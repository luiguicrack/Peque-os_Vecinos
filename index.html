<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pequeños Vecinos</title>
  <link rel="icon" type="image/png" href="../img/favicon.png">

  <!-- Bootstrap -->
   <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@300;400;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid main-scene">

    <!-- Fondo ciudad -->
    <div class="city"></div>

    <!-- Logo -->
    <div class="logo-container text-center">
        <img src="img/logo.png" class="logo img-fluid">
    </div>

    <!-- Animales -->
    <div class="animals">

        <img src="img/perro.png" class="animal dog">

        <img src="img/gato.png" class="animal cat">

        <img src="img/paloma.png" class="animal bird">

        <img src="img/raton.png" class="animal mouse">

        <img src="img/golondrina.png" class="animal swallow">
    </div>

    <!-- Botón -->
    <button class="next-btn"
    onclick="window.location.href='html/creditos.html'">

        <img src="img/flecha-right.png" alt="Siguiente">

    </button>

    <!-- BOTÓN MÚSICA -->

    <button id="musicBtn" class="music-btn">

        🔊

    </button>

        <!-- MENÚ -->
        <div class="bottom-menu">

        <!-- INICIO -->
        <button onclick="window.location.href='../index.html'">

            <img src="../img/home.png">

            <span>INICIO</span>

        </button>

        <!-- DETALLES -->
        <button onclick="window.location.href='../html/creditos.html'">

            <img src="../img/info.png">

            <span>DETALLES</span>

        </button>

        <!-- HISTORIAS -->
        <button onclick="window.location.href='../html/biblioteca.html'">

            <img src="../img/book.png">

            <span>HISTORIAS</span>

        </button>

    </div>

</div>

<audio id="bgMusic" autoplay loop>
    <source src="audio/ciudad.mp3" type="audio/mpeg">
</audio>

<script src="js/script.js"></script>
</body>
</html>
